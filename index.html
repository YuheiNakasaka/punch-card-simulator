<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Punch Card Programming Simulator</title>
  </head>
  <body>
    <!-- Header -->
    <header class="app-header">
      <div>
        <h1 data-i18n="meta.headerTitle">PUNCH CARD SIMULATOR</h1>
        <span class="subtitle" data-i18n="meta.subtitle"
          >IBM 80-Column Card &mdash; Interactive Programming Experience</span
        >
      </div>
      <div class="header-toggles">
        <button id="audio-toggle" class="audio-toggle" title="Toggle sound">
          <span id="audio-label">Sound OFF</span>
        </button>
        <button id="mode-toggle" class="mode-toggle" data-i18n-title="mode.tooltip" title="Toggle input mode">
          <span class="mode-option active" data-mode="easy">EASY</span>
          <span class="mode-divider">/</span>
          <span class="mode-option" data-mode="hard">HARD</span>
        </button>
        <button id="lang-toggle" class="lang-toggle">
          <span class="lang-option active" data-lang="en">EN</span>
          <span class="lang-divider">/</span>
          <span class="lang-option" data-lang="ja">JA</span>
        </button>
      </div>
    </header>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-group">
        <button
          id="btn-prev"
          class="btn"
          data-i18n="toolbar.prev"
          data-i18n-title="tooltips.prev"
          title="Previous card"
        >
          &larr; Prev
        </button>
        <span id="card-counter">Card 1 of 1</span>
        <button
          id="btn-next"
          class="btn"
          data-i18n="toolbar.next"
          data-i18n-title="tooltips.next"
          title="Next card (or add new)"
        >
          Next &rarr;
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <div class="toolbar-group">
        <button
          id="btn-add"
          class="btn"
          data-i18n="toolbar.addCard"
          data-i18n-title="tooltips.addCard"
          title="Insert new card after current"
        >
          + Add Card
        </button>
        <button
          id="btn-remove"
          class="btn btn-danger"
          data-i18n="toolbar.remove"
          data-i18n-title="tooltips.remove"
          title="Remove current card"
        >
          &times; Remove
        </button>
        <button
          id="btn-clear-card"
          class="btn"
          data-i18n="toolbar.clearCard"
          data-i18n-title="tooltips.clearCard"
          title="Clear current card"
        >
          Clear Card
        </button>
        <button
          id="btn-clear-deck"
          class="btn btn-danger"
          data-i18n="toolbar.clearDeck"
          data-i18n-title="tooltips.clearDeck"
          title="Clear all cards"
        >
          Clear Deck
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <div class="toolbar-group">
        <select
          id="examples-select"
          data-i18n-title="tooltips.loadExample"
          title="Load example program"
        >
          <option value="" data-i18n="toolbar.loadExample">
            Load Example...
          </option>
        </select>
      </div>

      <div class="toolbar-divider"></div>

      <div class="toolbar-group zoom-controls">
        <button
          id="btn-zoom-out"
          class="btn"
          data-i18n-title="tooltips.zoomOut"
          title="Zoom out"
        >
          -
        </button>
        <span id="zoom-level" class="zoom-level-label">100%</span>
        <button
          id="btn-zoom-in"
          class="btn"
          data-i18n-title="tooltips.zoomIn"
          title="Zoom in"
        >
          +
        </button>
        <button
          id="btn-zoom-reset"
          class="btn"
          data-i18n="toolbar.zoomReset"
          data-i18n-title="tooltips.zoomReset"
          title="Reset zoom"
        >
          Reset
        </button>
      </div>
    </div>

    <!-- Punch Card Area -->
    <div class="card-area">
      <div id="card-container"></div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="deck" data-i18n="tabs.deck">
        Deck
      </button>
      <button class="tab-btn" data-tab="output" data-i18n="tabs.output">
        Output
      </button>
      <button class="tab-btn" data-tab="reference" data-i18n="tabs.encoding">
        Encoding
      </button>
      <button class="tab-btn" data-tab="tutorial" data-i18n="tabs.tutorial">
        Tutorial
      </button>
    </div>

    <!-- Tab Panels -->
    <div class="tab-content">
      <div id="tab-deck" class="tab-panel active">
        <div id="deck-overview"></div>
      </div>

      <div id="tab-output" class="tab-panel">
        <div id="terminal-output"></div>
        <div id="terminal-input-area" class="hidden">
          <span id="terminal-input-label"></span>
          <input id="terminal-input" type="text" autocomplete="off" />
        </div>
      </div>

      <div id="tab-reference" class="tab-panel"></div>
      <div id="tab-tutorial" class="tab-panel"></div>
    </div>

    <!-- Execution Bar -->
    <div class="exec-bar">
      <button
        id="btn-run"
        class="btn btn-primary"
        data-i18n="job.submitJob"
        data-i18n-title="tooltips.run"
        title="Submit job for execution"
      >
        Submit Job
      </button>
      <button
        id="btn-stop"
        class="btn btn-danger hidden"
        data-i18n="job.stopJob"
        title="Stop current job"
      >
        Stop Job
      </button>
      <button
        id="btn-step"
        class="btn"
        data-i18n="exec.step"
        data-i18n-title="tooltips.step"
        title="Execute one instruction"
      >
        Step
      </button>
      <button
        id="btn-reset"
        class="btn"
        data-i18n="exec.reset"
        data-i18n-title="tooltips.reset"
        title="Reset execution state"
      >
        Reset
      </button>

      <div class="toolbar-divider"></div>

      <div class="speed-control">
        <label class="speed-label" data-i18n="speed.label">Speed</label>
        <select id="speed-select">
          <option value="instant" data-i18n="speed.instant">Instant</option>
          <option value="fast" data-i18n="speed.fast">Fast</option>
          <option value="realistic" selected data-i18n="speed.realistic">Realistic</option>
          <option value="slow" data-i18n="speed.slow">Slow</option>
        </select>
      </div>

      <span id="job-phase" class="job-phase-label"></span>

      <span class="exec-helper-text" data-i18n="exec.helperText">
        Type to punch characters &bull; Click cells to toggle &bull; Arrow keys
        to navigate
      </span>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
